<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DanikatShop - Todo lo que buscas en un solo lugar</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        slate: {
                            950: '#020617',
                        },
                        purple: {
                            400: '#c084fc',
                            500: '#a855f7',
                            600: '#9333ea',
                        },
                        fuchsia: {
                            500: '#d946ef',
                        }
                    },
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #020617 !important;
            color: #f8fafc;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* Scrollbar Estilizada */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(to bottom, #9333ea, #d946ef);
            border-radius: 10px;
        }

        /* Animaciones para la carga de productos */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-slide-up {
            animation: slideUp 0.5s ease-out forwards;
        }

        /* Fondo con destellos sutiles para la marca */
        .brand-bg {
            background: radial-gradient(circle at top right, rgba(147, 51, 234, 0.15), transparent),
                        radial-gradient(circle at bottom left, rgba(217, 70, 239, 0.1), transparent);
        }
    </style>
</head>
<body class="font-sans antialiased brand-bg">

    <div id="app" class="min-h-screen">
        <div class="flex flex-col items-center justify-center min-h-screen">
            <div class="mb-4">
                <h1 class="text-3xl font-bold bg-gradient-to-r from-purple-400 to-fuchsia-500 bg-clip-text text-transparent">
                    DanikatShop
                </h1>
            </div>
            <div class="relative">
                <div class="w-10 h-10 border-2 border-purple-500/20 border-t-purple-500 rounded-full animate-spin"></div>
            </div>
            <p class="mt-4 text-slate-500 text-sm animate-pulse italic">
                Preparando sorpresas para ti...
            </p>
        </div>
    </div>

    <script src="./app.js"></script>

</body>
</html>
